name: iOS starter workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Test default scheme using any available iPhone simulator
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set Default Scheme
        run: |
          scheme_list=$(xcodebuild -list -json | tr -d "\n")
          default=$(echo $scheme_list | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['project']['targets'][0]")
          echo $default | cat >default
          echo Using default scheme: $default
      - name: Prepare Build Variables
        id: prepare
        run: |
          scheme="${{ 'default' }}"
          platform="${{ 'iOS Simulator' }}"
          device=$(xcrun xctrace list devices 2>&1 | grep -oE 'iPhone.*?[^\(]+' | head -1 | awk '{$1=$1;print}' | sed -e "s/ Simulator$//")
          if [ "$scheme" = "default" ]; then scheme=$(cat default); fi
          if [ "$(ls -A | grep -i \.xcworkspace$)" ]; then filetype_parameter="workspace" && file_to_build="$(ls -A | grep -i \.xcworkspace$)"; else filetype_parameter="project" && file_to_build="$(ls -A | grep -i \.xcodeproj$)"; fi
          file_to_build=$(echo $file_to_build | awk '{$1=$1;print}')
          echo "device=$device" >> $GITHUB_OUTPUT
          echo "scheme=$scheme" >> $GITHUB_OUTPUT
          echo "filetype_parameter=$filetype_parameter" >> $GITHUB_OUTPUT
          echo "file_to_build=$file_to_build" >> $GITHUB_OUTPUT
          echo "platform=$platform" >> $GITHUB_OUTPUT
      - name: Build
        run: |
          xcodebuild build-for-testing -scheme "${{ steps.prepare.outputs.scheme }}" -${{ steps.prepare.outputs.filetype_parameter }} "${{ steps.prepare.outputs.file_to_build }}" -destination "platform=${{ steps.prepare.outputs.platform }},name=${{ steps.prepare.outputs.device }}"
      - name: Test
        run: |
          xcodebuild test-without-building -scheme "${{ steps.prepare.outputs.scheme }}" -${{ steps.prepare.outputs.filetype_parameter }} "${{ steps.prepare.outputs.file_to_build }}" -destination "platform=${{ steps.prepare.outputs.platform }},name=${{ steps.prepare.outputs.device }}"
